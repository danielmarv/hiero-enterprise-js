name: CI

on:
    push:
        branches:
            - main
            - develop
            - release/*
    pull_request:
        branches:
            - main
            - develop
            - release/*
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build:
        name: Build and Test
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
              with:
                  version: 10

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 24
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Setup Hiero Solo Network
              uses: hiero-ledger/hiero-solo-action@328bc84c3b00a990a151418144fd682a4eb76ea6 # v0.19.0
              id: solo
              with:
                  installMirrorNode: true
                  hieroVersion: v0.66.0
                  mirrorNodeVersion: v0.138.0
                  mirrorNodePortRest: 5551
                  mirrorNodePortGrpc: 5600
                  mirrorNodePortWeb3Rest: 8545
                  soloVersion: 0.46.1

            - name: Wait for Mirror Node
              run: |
                  echo "Waiting for Mirror Node REST API to be ready..."
                  for i in $(seq 1 60); do
                    if curl -s http://localhost:5551/api/v1/accounts | grep -q "accounts"; then
                      echo "Mirror Node is ready!"
                      break
                    fi
                    echo "Attempt $i/60 — waiting 5s..."
                    sleep 5
                  done
            - name: ESLint
              run: pnpm run lint

            - name: Build packages
              run: pnpm run build

            - name: Run unit and integration tests
              env:
                  HIERO_NETWORK: hiero-solo-action
                  HIERO_OPERATOR_ID: ${{ steps.solo.outputs.accountId }}
                  HIERO_OPERATOR_KEY: ${{ steps.solo.outputs.privateKey }}
                  HIERO_MIRROR_NODE_URL: http://localhost:5551
              run: pnpm run test
