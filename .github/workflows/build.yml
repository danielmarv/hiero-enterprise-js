name: CI

on:
    push:
        branches:
            - main
            - develop
            - release/*
    pull_request:
        branches:
            - main
            - develop
            - release/*

# Cancel in-progress runs for the same branch/PR
concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build:
        name: Build and Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
              with:
                  version: 10

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Setup Hiero Solo Network
              uses: hiero-ledger/hiero-solo-action@692b186bd2e4c8d46b9deb1c067dc6ddcf0abcd7 # v0.18.0
              id: solo
              with:
                  installMirrorNode: true
                  hieroVersion: v0.66.0
                  mirrorNodeVersion: v0.138.0
                  mirrorNodePortRest: 5551
                  mirrorNodePortGrpc: 5600
                  mirrorNodePortWeb3Rest: 8545
                  soloVersion: 0.46.1

            - name: Wait for Mirror Node
              run: |
                  echo "Waiting for Mirror Node REST API to be ready..."
                  for i in $(seq 1 60); do
                    if curl -s http://localhost:5551/api/v1/accounts | grep -q "accounts"; then
                      echo "Mirror Node is ready!"
                      break
                    fi
                    echo "Attempt $i/60 — waiting 5s..."
                    sleep 5
                  done
            - name: ESLint
              run: pnpm run lint

            - name: Build packages
              run: pnpm run build

            - name: Run unit and integration tests
              env:
                  HIERO_NETWORK: hiero-solo-action
                  HIERO_OPERATOR_ID: ${{ steps.solo.outputs.accountId }}
                  HIERO_OPERATOR_KEY: ${{ steps.solo.outputs.privateKey }}
                  HIERO_MIRROR_NODE_URL: http://localhost:5551
              run: pnpm run test
